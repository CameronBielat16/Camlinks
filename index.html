<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cameron_bielat</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --soil:    #2C2318;
      --bark:    #4A3728;
      --moss:    #7A6030;
      --stone:   #9E8355;
      --cream:   #F5EFE6;
      --parchment: #EDE4D8;
    }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(107,124,92,0.13) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(74,55,40,0.10) 0%, transparent 55%);
      font-family: 'Jost', sans-serif;
      color: var(--soil);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 72px;
    }

    /* ── Header ── */
    .handle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--bark);
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 48px;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      display: block;
      background: var(--parchment);
      border: 1px solid rgba(74,55,40,0.18);
      border-radius: 3px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--soil);
      position: relative;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .card:hover {
      background: #E8DDCF;
      border-color: rgba(74,55,40,0.35);
      transform: translateY(-2px);
    }

    .card-brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .card-sub {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--moss);
    }

    .card-arrow {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: var(--stone);
      transition: color 0.2s, right 0.15s;
    }

    .card:hover .card-arrow {
      color: var(--moss);
      right: 18px;
    }

    /* ── Coming soon card ── */
    .card.soon {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }

    .card.soon .card-sub {
      color: var(--stone);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(74,55,40,0.12);
    }

    .divider-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--stone);
    }

    /* ── Footer ── */
    footer {
      margin-top: 52px;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--stone);
    }
  </style>
</head>
<body>

  <p class="handle">cameron_bielat</p>
  <p class="tagline">Favourites &amp; discount codes</p>

  <div class="links">

    <!-- Healf -->
    <a class="card" href="https://healf.com/CAM" target="_blank" rel="noopener">
      <p class="card-brand">Healf</p>
      <p class="card-sub">Shop with my link</p>
      <span class="card-arrow">→</span>
    </a>

    <!-- DIRTEA -->
    <a class="card" href="https://www.dirteaworld.com/cameron15" target="_blank" rel="noopener">
      <p class="card-brand">DIRTEA</p>
      <p class="card-sub">Code: Cameron15</p>
      <span class="card-arrow">→</span>
    </a>

    <!-- Dendro -->
    <a class="card" href="https://www.dendrohealth.com/CAMERONBIELAT" target="_blank" rel="noopener">
      <p class="card-brand">Dendro Health</p>
      <p class="card-sub">10% off · Code: cameronbielat</p>
      <span class="card-arrow">→</span>
    </a>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-label">Coming soon</span>
      <div class="divider-line"></div>
    </div>

    <!-- LTK placeholder -->
    <div class="card soon">
      <p class="card-brand">My Favourites</p>
      <p class="card-sub">LTK — coming soon</p>
      <span class="card-arrow">→</span>
    </div>

  </div>

  <footer>© cameron_bielat</footer>

</body>
</html>
